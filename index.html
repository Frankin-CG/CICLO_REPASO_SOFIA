<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Economía - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fucsia: #DE1470;
            --fucsia-mid: #f0398a;
            --fucsia-light: #ff6aaa;
            --fucsia-pale: #fde8f3;
            --fucsia-ultra: #fff0f8;
            --rose: #fce4ef;
            --warm-white: #ffffff;
            --warm-gray: #f5f0f3;
            --text: #3a1a2e;
            --text-soft: #7a5a6a;
            --border: #f0d0e0;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fce4ef 0%, #fdf0f8 40%, #fce8f4 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(222,20,112,0.15), 0 0 0 1px rgba(222,20,112,0.12);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: linear-gradient(135deg, var(--fucsia) 0%, var(--fucsia-mid) 60%, #f06292 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(255,255,255,0.06) 28px, rgba(255,255,255,0.06) 29px
            );
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .teal-divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            margin: 10px auto 0;
        }

        /* INNER */
        .inner { padding: 36px 44px 40px; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--fucsia); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 10px;
            background: var(--rose); border-radius: 10px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--fucsia), var(--fucsia-light));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* QUESTION */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: var(--fucsia-pale);
            color: var(--fucsia);
            font-weight: 700; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--border);
        }
        .question-text {
            font-size: 1.2em; color: var(--text);
            margin-bottom: 22px; line-height: 1.65; font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border);
            border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.05em; background: var(--warm-white);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--fucsia-ultra);
            border: 2px solid var(--fucsia-light);
            color: var(--fucsia);
            font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--fucsia);
            background: var(--fucsia-ultra);
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(222,20,112,0.1);
        }
        .option:hover .option-letter {
            background: var(--fucsia); color: white; border-color: var(--fucsia);
        }
        .option.selected { border-color: var(--fucsia); background: var(--fucsia-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--fucsia-ultra), #fff8fc);
            border-left: 4px solid var(--fucsia);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--fucsia); }

        /* NAV */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer;
            transition: all 0.25s ease; font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--fucsia), var(--fucsia-mid));
            color: white;
            box-shadow: 0 4px 16px rgba(222,20,112,0.3);
            border: 2px solid transparent;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(222,20,112,0.4);
            background: linear-gradient(135deg, var(--fucsia-mid), var(--fucsia-light));
        }
        .btn-secondary {
            background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--fucsia-pale); border-color: var(--fucsia); color: var(--fucsia);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em; color: var(--text); margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--fucsia), var(--fucsia-mid));
            border: 5px solid var(--rose);
            color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(222,20,112,0.3), 0 0 0 10px rgba(222,20,112,0.08);
        }
        .nota-label { font-size: 0.82em; opacity: 0.85; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: rgba(255,255,255,0.85); }
        .nota-valor { font-family: 'Playfair Display', serif; font-size: 4em; font-weight: 900; line-height: 1; color: white; }
        .nota-total { font-size: 1em; opacity: 0.75; }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px;
            font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--fucsia); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--rose); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--fucsia), var(--fucsia-light)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #bbb; padding: 0 2px; }
        .grade-badge {
            display: inline-block; padding: 8px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: #fef9e7; color: #b7770d; border: 2px solid #f1c40f; }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--fucsia), var(--fucsia-mid));
            color: white;
            padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em;
            display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(222,20,112,0.3);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="teal-divider"></div>
    </div>

    <div class="inner">
        <div class="header">
            <h1>📊 Examen de <span>Economía</span></h1>
            <p>Ciclo Repaso · 31 Preguntas</p>
        </div>

        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 31</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="quizContainer"></div>

        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">31</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>

        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const questions = [
    {
        question: "Las guerras, el comercio exterior y el sometimiento de pueblos eran las 3 formas de conseguir riqueza. Esto sucedía en la doctrina:",
        options: ["Keynesiana", "Neoclásica", "Mercantilismo", "Monetarista", "Clásica"],
        correct: 2,
        justification: "El mercantilismo sostenía que la riqueza de un país se obtenía mediante la acumulación de metales preciosos, expansión comercial y dominio sobre otros pueblos."
    },
    {
        question: "Se considera como un conjunto de principios, normas, hipótesis y planteamientos que buscan interpretar una realidad económica:",
        options: ["Leyes económicas", "Modelos económicos", "Teoría del crecimiento", "Doctrinas económicas", "Teorías económicas"],
        correct: 3,
        justification: "Las doctrinas económicas son sistemas de pensamiento que explican cómo funciona la economía y proponen soluciones a sus problemas."
    },
    {
        question: "La política proteccionista basada en la política arancelaria la aplicó la doctrina:",
        options: ["Fisiócrata", "Clásica", "Keynesiana", "Monetarista", "Mercantilista"],
        correct: 4,
        justification: "El mercantilismo promovía aranceles altos para proteger la producción nacional y favorecer la balanza comercial positiva."
    },
    {
        question: "El aprovechamiento del mayor factor originario de la producción era _______, y se aplicaba en la doctrina:",
        options: ["tierra - mercantilista", "tierra - fisiócrata", "tierra - clásico", "trabajo - clásica", "trabajo - fisiócrata"],
        correct: 1,
        justification: "Los fisiócratas consideraban la tierra como la única fuente real de riqueza y el único factor verdaderamente productivo."
    },
    {
        question: "Se le conoce también como 'liberales' a la doctrina:",
        options: ["Keynesiana", "Socialista", "Neoclásica", "Clásica", "Monetarista"],
        correct: 3,
        justification: "Los economistas clásicos (Adam Smith, Ricardo) defendían el libre mercado y la mínima intervención del Estado, siendo llamados liberales."
    },
    {
        question: "En la economía socialista, las decisiones respecto a la producción son tomadas por:",
        options: ["Los consumidores", "Los individuos", "La empresa", "El Estado", "Los profesionales"],
        correct: 3,
        justification: "En el socialismo el Estado planifica y decide la producción y distribución de bienes y servicios."
    },
    {
        question: "Los clásicos en sus postulados consideran:",
        options: ["La teoría de la plusvalía", "El desarrollo de la microeconomía", "La planificación del Estado", "El desarrollo de la macroeconomía", "La defensa del libre comercio"],
        correct: 4,
        justification: "Los clásicos postulaban el laissez-faire y defendían el libre comercio internacional como motor del desarrollo económico."
    },
    {
        question: "La escuela keynesiana para incrementar la producción y el consumo en la economía debería:",
        options: ["Incrementar el gasto público", "Incrementar el presupuesto público", "Realizar políticas fiscales contractivas", "Disminuir el gasto público", "Privatizar la empresa pública"],
        correct: 0,
        justification: "Keynes propuso aumentar el gasto público para estimular la demanda agregada y sacar a la economía de la recesión."
    },
    {
        question: "Los actuales organismos reguladores de la economía tienen sus cimientos en la doctrina:",
        options: ["Monetarista", "Keynesiana", "Mercantilismo", "Clásica", "Neoclásica"],
        correct: 1,
        justification: "El keynesianismo justificó la intervención del Estado en la economía, base de los organismos reguladores modernos."
    },
    {
        question: "El dinero debe cumplir la función de _____ y debe ser respaldado con _____:",
        options: ["un bien económico / la confianza del congreso", "medio de pago / la confianza del público", "concentración / una forma metálica", "medio de cambio / un banco", "unidad de cuenta / las reservas internacionales"],
        correct: 1,
        justification: "El dinero funciona como medio de pago y su valor depende de la confianza colectiva del público en su aceptación general."
    },
    {
        question: "Al medir el valor de un bien o servicio nos referimos a una:",
        options: ["Característica del dinero", "Función del dinero", "Clase de dinero", "Condición del dinero", "Durabilidad del dinero"],
        correct: 1,
        justification: "El dinero actúa como unidad de cuenta o medida de valor, permitiendo comparar el precio de distintos bienes y servicios."
    },
    {
        question: "Si en una economía circulan dos monedas de igual valor legal pero distinto valor real, entonces la moneda mala desplaza de la circulación a la buena. Esto corresponde a la:",
        options: ["Ley de Gossen", "Oferta monetaria", "Ley de Gresham", "Inflación", "Falsificación"],
        correct: 2,
        justification: "La Ley de Gresham establece que cuando coexisten dos monedas, la de menor valor real (moneda mala) desplaza a la de mayor valor real (moneda buena)."
    },
    {
        question: "Definir la totalidad de medios de pago existentes y que circulan en una economía nos referimos a:",
        options: ["Los bienes", "La oferta monetaria", "Depósitos a plazo", "Billetes", "Monedas"],
        correct: 1,
        justification: "La oferta monetaria es el total de dinero disponible y en circulación en una economía en un momento dado."
    },
    {
        question: "Son los que constituyen los pasivos del Banco Central de Reserva:",
        options: ["Reservas Internacionales Netas", "Crédito interno neto al sector privado", "Crédito interno al sector público", "Billetes y monedas emitidos", "Deuda interna del país"],
        correct: 3,
        justification: "El dinero emitido representa una obligación (pasivo) del Banco Central, ya que es una deuda del BCRP hacia quienes lo poseen."
    },
    {
        question: "Los depósitos de los bancos forman parte de los:",
        options: ["Pasivos del BCRP", "Activos del BCRP", "Pasivos del Banco de la Nación", "Activos del COFIDE", "Pasivos del COFIDE"],
        correct: 0,
        justification: "Los depósitos que los bancos comerciales mantienen en el BCRP son obligaciones del Banco Central, es decir, forman parte de sus pasivos."
    },
    {
        question: "Al incremento continuo en el nivel general de precios se le denomina:",
        options: ["Inflación", "Oferta monetaria", "Desempleo", "Elasticidad", "Devaluación"],
        correct: 0,
        justification: "La inflación es el aumento sostenido y generalizado del nivel de precios de bienes y servicios en una economía."
    },
    {
        question: "Es una causa de la inflación:",
        options: ["Caída del PBI", "Fuga de capitales", "Aumento rápido del circulante", "Encarecimiento de los créditos", "Disminución del circulante"],
        correct: 2,
        justification: "Cuando hay exceso de dinero en circulación, hay más dinero persiguiendo los mismos bienes, lo que genera presión inflacionaria (teoría cuantitativa del dinero)."
    },
    {
        question: "Al descenso general en el nivel de precios se le denomina:",
        options: ["Inflación galopante", "Inflación importada", "Deflación", "Inflación estructural", "Hiperinflación"],
        correct: 2,
        justification: "La deflación es la caída general y sostenida del nivel de precios, fenómeno opuesto a la inflación."
    },
    {
        question: "Al incremento de más del 1000% de inflación se le denomina:",
        options: ["Inflación moderada", "Inflación galopante", "Hiperinflación", "Deflación", "Inflación estructural"],
        correct: 2,
        justification: "La hiperinflación ocurre cuando los precios suben de forma extremadamente acelerada, superando el 1000% anual."
    },
    {
        question: "La institución pública que en nuestro país está más relacionada con la función estabilizadora es:",
        options: ["El Banco Central de Reserva", "La Superintendencia de Banca y Seguros", "La Contraloría General de la República", "El Ministerio de Producción", "El Poder Judicial"],
        correct: 0,
        justification: "El BCRP cumple la función estabilizadora mediante la política monetaria, controlando la inflación y estabilizando el tipo de cambio."
    },
    {
        question: "Situación presupuestal en la cual los ingresos son iguales a los egresos del Estado:",
        options: ["Superávit fiscal", "Superávit comercial", "Déficit comercial", "Equilibrio comercial", "Equilibrio fiscal"],
        correct: 4,
        justification: "Cuando los ingresos del Estado son exactamente iguales a sus gastos, se denomina equilibrio fiscal, sin superávit ni déficit."
    },
    {
        question: "Órgano dependiente del Ministerio de Economía y Finanzas encargado de realizar la estimación de los ingresos y la previsión de los gastos del Estado:",
        options: ["La Dirección Nacional de Presupuesto Público", "Los congresistas", "El Ministerio de Economía y Finanzas", "Los alcaldes de los gobiernos regionales y locales", "El Consejo de Ministros"],
        correct: 0,
        justification: "La DNPP es el órgano técnico especializado del MEF responsable de dirigir el proceso presupuestario del sector público."
    },
    {
        question: "Institución pública autónoma encargada de realizar política monetaria:",
        options: ["Banco de la Nación", "Ministerio de Economía y Finanzas", "Banco Central de Reserva", "Superintendencia de Banca y Seguros", "Los Bancos Comerciales"],
        correct: 2,
        justification: "El BCRP es el organismo constitucionalmente autónomo encargado de regular la moneda y el crédito del sistema financiero peruano."
    },
    {
        question: "En el sector público, los instrumentos de política económica están a cargo de la política fiscal y la política monetaria, respectivamente:",
        options: ["MEF y BCRP", "SBS y BCRP", "MEF y Banco de la Nación", "FMI y los Bancos", "SMV y BCR"],
        correct: 0,
        justification: "El MEF conduce la política fiscal (impuestos y gasto público) y el BCRP conduce la política monetaria (dinero y crédito)."
    },
    {
        question: "Al utilizar instrumentos del gobierno como los impuestos y subvenciones, el gobierno está realizando una función:",
        options: ["Reguladora", "Estabilizadora", "Anticíclica", "Proveedora", "De control"],
        correct: 1,
        justification: "Cuando el gobierno utiliza impuestos y subvenciones, está aplicando política fiscal para influir en la actividad económica (estimularla o frenarla)."
    },
    {
        question: "Las fases del proceso presupuestario son:",
        options: ["Programación, formulación, aprobación, ejecución, control y evaluación", "Formulación, aprobación, ejecución, control y evaluación", "Programación y evaluación", "Formulación, ejecución y control", "Aprobación, ejecución y evaluación"],
        correct: 0,
        justification: "El proceso presupuestario peruano tiene cinco fases: programación, formulación, aprobación, ejecución y evaluación/control, según la Ley General del Sistema Nacional de Presupuesto."
    },
    {
        question: "Etapa del proceso presupuestario en la que se estiman los ingresos y la previsión de los gastos del Estado:",
        options: ["Formulación", "Programación", "Ejecución", "Aprobación", "Control y evaluación"],
        correct: 1,
        justification: "En la fase de programación se estiman los ingresos que percibirá el Estado y se prevén los gastos necesarios para el siguiente año fiscal."
    },
    {
        question: "La estimación de los ingresos y la previsión de los gastos del Estado está a cargo de:",
        options: ["Dirección Nacional de Presupuesto Público", "Ministerio de Economía y Finanzas", "Consejo de Ministros", "Presidente de la República", "Poder Legislativo"],
        correct: 0,
        justification: "La DNPP es la responsable técnica de elaborar la estimación de ingresos y la previsión de gastos dentro del proceso presupuestario."
    },
    {
        question: "¿Cuál de las siguientes alternativas constituye una consecuencia de la deuda externa?",
        options: ["Mayor acercamiento entre países", "Mayor dependencia de capitales", "Aumento de la productividad", "Mayor bienestar social", "Mejora de la distribución de la renta"],
        correct: 1,
        justification: "La deuda externa genera dependencia financiera de organismos y países acreedores, condicionando las políticas económicas del país deudor."
    },
    {
        question: "La dirección de la política del endeudamiento del Estado peruano está a cargo de:",
        options: ["Ministerio de Economía y Finanzas", "La Superintendencia de Banca y Seguros", "El Consejo de Ministros", "El Parlamento Nacional", "La Contraloría General"],
        correct: 0,
        justification: "El MEF dirige y gestiona la política de endeudamiento público del Estado peruano, tanto interno como externo."
    },
    {
        question: "Un mecanismo para cubrir el déficit presupuestal sería:",
        options: ["Incrementar el gasto fiscal", "Reducir la emisión monetaria", "Reducir el gasto corriente", "Reducir la base tributaria", "Aumentar las exoneraciones tributarias"],
        correct: 2,
        justification: "Para cubrir un déficit presupuestal se deben reducir los egresos o aumentar los ingresos. La opción más directa es recortar el gasto corriente del Estado."
    }
];

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>💡 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    // Nota redondeada al entero más cercano
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Economía. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos económicos. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>

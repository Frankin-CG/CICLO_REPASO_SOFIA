<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Historia del Perú - Academia Sofía</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarillo: #f5a623;
            --amarillo-mid: #f5ce00;
            --amarillo-dark: #e0b800;
            --amarillo-pale: #fef9cc;
            --amarillo-ultra: #fffde8;
            --naranja: #f5a623;
            --naranja-mid: #f0921a;
            --naranja-pale: #fff3e0;
            --cafe-claro: #c8860a;
            --cafe-suave: #a87020;
            --warm-white: #ffffff;
            --text: #5a3e00;
            --text-soft: #8a6520;
            --text-mid: #7a5010;
            --border: #f0d060;
            --border-pale: #faeaa0;
            --correct: #1a7a4a;
            --correct-bg: #e6f7ee;
            --incorrect: #c0392b;
            --incorrect-bg: #fdecea;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #a18e0f 0%, #e9cf40 35%, #f3e262 70%, #f7d770 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .container {
            background: var(--warm-white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(247,219,38,0.45), 0 0 0 2px rgba(240,180,20,0.4);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* HEADER */
        .academy-header {
            background: linear-gradient(135deg, var(--amarillo) 0%, var(--naranja) 60%, #f5b830 100%);
            padding: 32px 40px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academy-header::before {
            content: '';
            position: absolute;
            top: -40px; left: -40px; right: -40px; bottom: -40px;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 28px,
                rgba(255,255,255,0.12) 28px, rgba(255,255,255,0.12) 29px
            );
        }
        .academy-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
        }
        .logo-container {
            position: relative;
            width: 100%; max-width: 300px;
            margin: 0 auto 16px;
        }
        .logo-container img { width: 100%; height: auto; max-height: 120px; object-fit: contain; }
        .teal-divider {
            width: 80px; height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
            margin: 10px auto 0;
        }

        /* INNER */
        .inner { padding: 36px 44px 40px; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header h1 span { color: var(--naranja-mid); }
        .header p { color: var(--text-soft); font-size: 1em; font-weight: 600; }

        /* PROGRESS */
        .progress-wrapper { margin-bottom: 28px; }
        .progress-info {
            display: flex; justify-content: space-between;
            font-size: 0.85em; color: var(--text-soft);
            font-weight: 700; margin-bottom: 8px;
        }
        .progress-bar {
            width: 100%; height: 10px;
            background: var(--amarillo-pale);
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border-pale);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--amarillo), var(--naranja));
            width: 0%; transition: width 0.4s ease; border-radius: 10px;
        }

        /* QUESTION */
        .question-card { display: none; animation: slideIn 0.35s ease; }
        .question-card.active { display: block; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, var(--amarillo), #f5ce00);
            color: var(--text);
            font-weight: 800; font-size: 0.82em;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 50px; margin-bottom: 14px;
            border: 1.5px solid var(--amarillo-dark);
        }
        .question-text {
            font-size: 1.2em; color: var(--text);
            margin-bottom: 22px; line-height: 1.65; font-weight: 600;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            padding: 16px 22px;
            border: 2px solid var(--border-pale);
            border-radius: 12px; cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1.05em; background: var(--warm-white);
            color: var(--text);
            display: flex; align-items: center; gap: 12px;
        }
        .option-letter {
            width: 30px; height: 30px; min-width: 30px;
            border-radius: 50%;
            background: var(--amarillo-ultra);
            border: 2px solid var(--border);
            color: var(--cafe-suave);
            font-weight: 800; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s ease;
        }
        .option:hover {
            border-color: var(--naranja);
            background: var(--naranja-pale);
            transform: translateX(6px);
            box-shadow: 0 4px 16px rgba(245,166,35,0.25);
        }
        .option:hover .option-letter {
            background: var(--amarillo); color: var(--text); border-color: var(--amarillo-dark);
        }
        .option.selected { border-color: var(--naranja); background: var(--naranja-pale); }
        .option.correct { border-color: var(--correct); background: var(--correct-bg); }
        .option.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
        .option.incorrect { border-color: var(--incorrect); background: var(--incorrect-bg); }
        .option.incorrect .option-letter { background: var(--incorrect); color: white; border-color: var(--incorrect); }
        .option.disabled { cursor: not-allowed; }
        .option.disabled:hover { transform: none; box-shadow: none; }

        /* JUSTIFICATION */
        .justification {
            display: none;
            margin-top: 20px; padding: 18px 22px;
            background: linear-gradient(to right, var(--amarillo-pale), var(--amarillo-ultra));
            border-left: 4px solid var(--amarillo);
            border-radius: 10px;
            animation: fadeUp 0.4s ease;
            font-size: 1em; color: var(--text-soft); line-height: 1.6;
        }
        .justification.show { display: block; }
        .justification strong { color: var(--naranja-mid); }

        /* NAV */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; gap: 14px; }
        .btn {
            padding: 14px 32px; border: none; border-radius: 10px;
            font-size: 1em; cursor: pointer;
            transition: all 0.25s ease; font-weight: 700;
            font-family: 'Nunito', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--amarillo), var(--naranja));
            color: var(--text);
            box-shadow: 0 4px 16px rgba(247,219,38,0.5);
            border: 2px solid var(--amarillo-dark);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245,166,35,0.45);
            background: linear-gradient(135deg, var(--naranja), var(--naranja-mid));
            color: white;
        }
        .btn-secondary {
            background: var(--warm-white); color: var(--text-soft); border: 2px solid var(--border-pale);
        }
        .btn-secondary:hover {
            background: var(--amarillo-pale); border-color: var(--border); color: var(--text-mid);
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

        /* RESULTS */
        .results { display: none; text-align: center; }
        .results.show { display: block; }
        .results h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9em; color: var(--text); margin-bottom: 8px;
        }
        .score-circle {
            width: 200px; height: 200px; border-radius: 50%;
            background: linear-gradient(135deg, var(--amarillo), var(--naranja));
            border: 5px solid var(--amarillo-pale);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            margin: 28px auto 14px;
            box-shadow: 0 12px 40px rgba(247,219,38,0.5), 0 0 0 10px rgba(247,219,38,0.15);
        }
        .nota-label { font-size: 0.82em; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; color: var(--text); opacity: 0.75; }
        .nota-valor { font-family: 'Playfair Display', serif; font-size: 4em; font-weight: 900; line-height: 1; color: var(--text); }
        .nota-total { font-size: 1em; color: var(--text-mid); }
        .score-detail {
            display: inline-block; background: var(--warm-white);
            border: 2px solid var(--border-pale); border-radius: 12px;
            padding: 10px 28px; margin-bottom: 20px;
            font-size: 1em; color: var(--text-soft);
        }
        .score-detail span { font-weight: 800; color: var(--naranja-mid); }
        .grade-bar-container { width: 100%; max-width: 480px; margin: 0 auto 20px; }
        .grade-bar-bg { width: 100%; height: 16px; background: var(--amarillo-pale); border-radius: 10px; overflow: hidden; margin-bottom: 6px; border: 1px solid var(--border-pale); }
        .grade-bar-fill { height: 100%; border-radius: 10px; transition: width 1s ease; background: linear-gradient(90deg, var(--amarillo), var(--naranja)); }
        .grade-bar-labels { display: flex; justify-content: space-between; font-size: 0.78em; color: #cca840; padding: 0 2px; }
        .grade-badge {
            display: inline-block; padding: 8px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1em; margin-bottom: 16px; letter-spacing: 0.5px;
        }
        .badge-excelente   { background: #e6f7ee; color: #1a7a4a; border: 2px solid #2ecc71; }
        .badge-bueno       { background: #e8f4fd; color: #1565c0; border: 2px solid #3498db; }
        .badge-regular     { background: var(--amarillo-pale); color: var(--cafe-claro); border: 2px solid var(--amarillo-dark); }
        .badge-desaprobado { background: #fdecea; color: #c0392b; border: 2px solid #e74c3c; }
        .results p.result-msg {
            font-size: 1.1em; color: var(--text-soft); margin-bottom: 24px;
            line-height: 1.7; max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .results-motto {
            background: linear-gradient(135deg, var(--amarillo), var(--naranja));
            color: var(--text);
            padding: 14px 32px; border-radius: 50px;
            font-weight: 800; font-size: 1.05em;
            display: inline-block; margin-top: 8px;
            letter-spacing: 1.5px; text-transform: uppercase;
            box-shadow: 0 4px 16px rgba(247,219,38,0.4);
            border: 2px solid var(--amarillo-dark);
        }

        @media (max-width: 600px) {
            .inner { padding: 24px 20px; }
            .academy-header { padding: 24px 20px; }
            .header h1 { font-size: 1.5em; }
            .question-text { font-size: 1.05em; }
            .nav-buttons { flex-direction: column; }
            .score-circle { width: 160px; height: 160px; }
            .nota-valor { font-size: 3.2em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="academy-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="teal-divider"></div>
    </div>
    <div class="inner">
        <div class="header">
            <h1>🏛️ Examen de <span>Historia del Perú</span></h1>
            <p>Ciclo Repaso · 31 Preguntas</p>
        </div>
        <div class="progress-wrapper">
            <div class="progress-info">
                <span id="progressText">Pregunta 1 de 31</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div id="quizContainer"></div>
        <div class="results" id="results">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="score-circle">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="finalNota">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="score-detail">
                Respuestas correctas: <span id="finalScore">0</span> de <span id="totalQuestions">31</span>
            </div>
            <div class="grade-bar-container">
                <div class="grade-bar-bg">
                    <div class="grade-bar-fill" id="gradeBarFill" style="width:0%"></div>
                </div>
                <div class="grade-bar-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="gradeBadge" class="grade-badge"></div>
            <p class="result-msg" id="resultMessage"></p>
            <div class="results-motto">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primary" onclick="restartQuiz()">🔄 Reintentar Examen</button>
        </div>
        <div class="nav-buttons" id="navButtons">
            <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()">← Anterior</button>
            <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
        </div>
    </div>
</div>
<script>
const questions = [
    {
        question: "Según el drama incaico, ¿quién capturó a Ollanta?",
        options: ["Túpac Yupanqui", "Orcco Huarancca", "Piqui Chaki", "Rumi Ñahui", "Inca Pachacutec"],
        correct: 3,
        justification: "En el drama quechua Ollantay, el general Rumi Ñahui es quien captura a Ollanta mediante una estratagema cuando este se encontraba dormido."
    },
    {
        question: "Reconocido como inca a la muerte de Atahualpa, encabezó en el siglo XVI la primera gran rebelión contra el poder español:",
        options: ["Huáscar", "Sayri Tupac", "Manco Inca", "Pachacútec", "Túpac Amaru"],
        correct: 2,
        justification: "Manco Inca, coronado por los españoles, lideró en 1536 la gran rebelión indígena que sitió Cusco y Lima, siendo la primera gran resistencia organizada contra la dominación española en el siglo XVI."
    },
    {
        question: "Eran los municipios de la época Virreinal, estaban a cargo de un alcalde y regidores:",
        options: ["Las audiencias", "Los cabildos", "Los corregimientos", "Las intendencias", "Las municipalidades"],
        correct: 1,
        justification: "Los cabildos fueron las instituciones de gobierno local durante el Virreinato, equivalentes a los municipios actuales. Estaban presididos por un alcalde y compuestos por regidores elegidos entre los vecinos principales."
    },
    {
        question: "Pueblo precerámico, ubicado en el desierto de Cupisnique, Lambayeque, creador de una industria lítica caracterizada por la elaboración de puntas de flecha bifaciales:",
        options: ["Chavín", "Paracas", "Guitarrero", "Toquepala", "Paijan"],
        correct: 4,
        justification: "La cultura Paijanense es una de las más antiguas de la costa norte peruana, reconocida por sus puntas bifaciales de gran tamaño denominadas 'puntas de Paiján', halladas en el desierto de Cupisnique."
    },
    {
        question: "Su religión tuvo como dios principal a la divinidad llamada AIAPAEC; y otro secundario llamado NI o dios del mar; el jaguar simbolizó la fuerza y el poder. Se refiere a la cultura:",
        options: ["Nasca", "Chavín", "Paracas", "Vicus", "Moche"],
        correct: 4,
        justification: "La cultura Moche (Mochica) tuvo como deidad principal a Aiapaec o 'El Degollador'. Ni era el dios del mar, y el jaguar era símbolo del poder y la fuerza en su iconografía."
    },
    {
        question: "Las fuerzas rebeldes de Túpac Amaru II derrotaron al ejército español en noviembre de 1780 en:",
        options: ["Tinta", "Tungasuca", "Checacupe", "Sangarará", "Surimana"],
        correct: 3,
        justification: "La Batalla de Sangarará (18 de noviembre de 1780) fue la victoria más importante de las fuerzas de Túpac Amaru II, donde derrotaron al ejército realista encabezado por el corregidor Tiburcio Landa."
    },
    {
        question: "El decreto que establece el Mar Territorial Peruano de las 200 millas se dio en el gobierno de:",
        options: ["Fernando Belaunde Terry", "General Manuel A. Odría", "José Luis Bustamante y Rivero", "1er Gobierno de Manuel Prado y Ugarteche", "2do Gobierno de Manuel Prado y Ugarteche"],
        correct: 2,
        justification: "El Decreto Supremo del 1 de agosto de 1947, promulgado durante el gobierno de Bustamante y Rivero, estableció la soberanía del Perú sobre las 200 millas marinas, siendo un hito en el derecho marítimo internacional."
    },
    {
        question: "La reforma agraria que modificó el régimen de tenencia de la tierra fue dada por ley del:",
        options: ["14 de junio de 1969", "14 de julio de 1969", "24 de julio de 1969", "28 de julio de 1969", "24 de junio de 1969"],
        correct: 4,
        justification: "El Decreto Ley N° 17716, promulgado el 24 de junio de 1969 por el General Juan Velasco Alvarado, estableció la Reforma Agraria que transformó la estructura de propiedad de la tierra en el Perú."
    },
    {
        question: "La teoría autoctonista que explica el origen de las 'Altas Culturas' peruanas está defendida por:",
        options: ["Julio C. Tello Rojas", "Max Uhle", "Luis Guillermo Lumbreras", "Paul Rivet", "Federico Kauffman Doig"],
        correct: 0,
        justification: "Julio C. Tello, padre de la arqueología peruana, sostuvo que las altas culturas andinas tuvieron origen propio derivando de culturas amazónicas locales, sin influencia exterior."
    },
    {
        question: "El período que desarrolló el primer Imperio Pan-Andino, alrededor del año 1100 d.C., corresponde al:",
        options: ["Intermedio Temprano", "Horizonte Tardío", "Intermedio Tardío", "Horizonte Medio", "Horizonte Temprano"],
        correct: 3,
        justification: "El Horizonte Medio (600–1100 d.C.) corresponde al apogeo de la cultura Wari, que consolidó el primer Estado panandino dominando a numerosos pueblos mediante centros administrativos y caminos."
    },
    {
        question: "El conflicto militar del Alto Cenepa entre Perú y Ecuador llegó a su fin con:",
        options: ["La firma del Protocolo de Paz, Amistad y Límites del 29-02-1942", "La Declaración de Paz de Itamaraty del 17-02-1995", "El Tratado de Río Blanco-Velarde del 08-09-1909", "El Tratado de Paz de Ancón del 20-10-1883", "El Tratado Polo Bustamante de 1909"],
        correct: 1,
        justification: "El conflicto del Cenepa (enero-febrero 1995) concluyó con la Declaración de Paz de Itamaraty, firmada el 17 de febrero de 1995 en Brasil, estableciendo el cese al fuego y el inicio de negociaciones definitivas."
    },
    {
        question: "Las provincias de Grau, Bolognesi y Castilla pertenecen respectivamente a los departamentos de:",
        options: ["Piura, Tacna, Loreto", "Junín, Moquegua, Lambayeque", "Apurímac, Áncash, Arequipa", "Tumbes, Huánuco, San Martín", "La Libertad, Amazonas, Cajamarca"],
        correct: 2,
        justification: "La provincia de Grau pertenece al departamento de Apurímac; Bolognesi, a Áncash; y Castilla, a Arequipa."
    },
    {
        question: "Los Paracas le ganaron tierras al desierto construyendo:",
        options: ["Acueductos", "Andenes", "Hoyas o Campos hundidos", "Desalitrando el terreno", "Fertilizando el terreno"],
        correct: 2,
        justification: "Los Paracas desarrollaron las 'hoyas' o 'mahamaes', campos hundidos que aprovechaban la humedad subterránea del subsuelo desértico para cultivar, siendo una destacada innovación agrícola."
    },
    {
        question: "Según la Capitulación de Toledo, Hernando de Luque fue designado:",
        options: ["Protector de naturales", "Conquistador", "Capitán general", "Gobernador", "Alguacil mayor"],
        correct: 0,
        justification: "En la Capitulación de Toledo (1529), Hernando de Luque —socio financiero de Pizarro y Almagro— recibió el título de 'Protector de naturales' y Obispo de Tumbes."
    },
    {
        question: "Las tierras en el Incanato se dividían en:",
        options: ["Tierras del Inca, del ayllu y del estado", "Tierras del estado, de las huacas y del ayllu", "Tierras del Sol, del Inca y del ayllu", "Tierras del Inca y del rey sol", "Tierras del Inca, del estado, de las huacas y del ayllu"],
        correct: 2,
        justification: "En el Tahuantinsuyo las tierras se dividían en tres grupos: las del Sol (culto religioso), las del Inca (Estado y ejército) y las del ayllu (comunidad)."
    },
    {
        question: "La Junta Militar que presidía Manuel Odría dictó una ley para perseguir a los apristas y comunistas; esta ley fue:",
        options: ["Ley de Seguridad Interior de la República", "Ley de Seguridad de la República", "Ley de la República", "Ley del Interior", "Ley de Seguridad"],
        correct: 0,
        justification: "La Ley de Seguridad Interior de la República (1948), promulgada por Odría, fue el instrumento legal para perseguir y encarcelar a militantes apristas y comunistas, restringiendo las libertades políticas."
    },
    {
        question: "El ferrocarril Lima-Callao, señal de prosperidad generada por la venta del guano, se realizó durante el gobierno de:",
        options: ["Primer Gobierno de Ramón Castilla (1845–1851)", "Gobierno de José Echenique (1851–1854)", "Segundo Gobierno de Ramón Castilla (1855–1862)", "Gobierno de José Balta (1868–1872)", "Gobierno de Manuel Pardo y Lavalle (1872–1876)"],
        correct: 0,
        justification: "El ferrocarril Lima-Callao, inaugurado el 17 de mayo de 1851, fue el primero de América del Sur y se construyó durante el primer gobierno de Ramón Castilla, financiado con ingresos del guano."
    },
    {
        question: "Las 'Cabezas Clavas' son esculturas de piedra insertadas en la pared del templo. Estas pertenecen a:",
        options: ["Chavín (Horizonte Temprano)", "Nasca (Fin Horizonte Temprano)", "Paracas (Fin Horizonte Temprano)", "Pukara (Intermedio Temprano)", "Vicus (Intermedio Temprano)"],
        correct: 0,
        justification: "Las cabezas clavas son esculturas en forma de cabezas humanas o felinas que adornan los muros del Templo de Chavín de Huántar, símbolo emblemático del Horizonte Temprano."
    },
    {
        question: "Elaboró el Primer Presupuesto Estatal para el período 1845–1846:",

    {

        correct: 3,

    {
        question: "¿Qué término utilizó Augusto B. Leguía para identificar al régimen que se mantuvo por once años en el poder?",
        options: ["Patria Nueva", "Estado moderno", "Estado Nuevo", "Ninguna anterior", "Cambio Social"],
        correct: 0,
        justification: "Augusto B. Leguía denominó 'Patria Nueva' a su régimen autoritario que gobernó el Perú entre 1919 y 1930, impulsando modernización pero concentrando el poder y reprimiendo la oposición."

    {

        correct: 0,
        justification: "La famosa Entrevista de Guayaquil se realizó el 26 y 27 de julio de 1822 en Guayaquil (Ecuador), ciudad que no figura entre las opciones, por lo que la respuesta es 'Ninguna de las anteriores'."

        correct: 3,
        justification: "Las Leyes Nuevas de 1542 buscaban abolir las encomiendas hereditarias y limitar el poder de los encomenderos. Esta amenaza a sus privilegios provocó la rebelión de Gonzalo Pizarro en el Perú."

let currentQuestion = 0;
let score = 0;
let answered = false;
const userAnswers = [];

function initQuiz() { renderQuestion(); updateProgress(); updateButtons(); }

function renderQuestion() {
    const q = questions[currentQuestion];
    const container = document.getElementById('quizContainer');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    container.innerHTML = `
        <div class="question-card active">
            <div class="question-number">Pregunta ${currentQuestion + 1} de ${questions.length}</div>
            <div class="question-text">${q.question}</div>
            <div class="options">
                ${q.options.map((option, index) => `
                    <div class="option" onclick="selectOption(${index})" data-index="${index}">
                        <span class="option-letter">${letters[index]}</span>
                        <span>${option}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justification" id="justification">
                <strong>💡 Justificación:</strong> ${q.justification}
            </div>
        </div>
    `;
    if (userAnswers[currentQuestion] !== undefined) showPreviousAnswer();
}

function selectOption(index) {
    if (answered) return;
    const options = document.querySelectorAll('.option');
    options.forEach(opt => opt.classList.remove('selected'));
    options[index].classList.add('selected');
    answered = true;
    userAnswers[currentQuestion] = index;
    const q = questions[currentQuestion];
    setTimeout(() => {
        if (index === q.correct) { options[index].classList.add('correct'); score++; }
        else { options[index].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
        options.forEach(opt => opt.classList.add('disabled'));
        document.getElementById('justification').classList.add('show');
        updateButtons();
    }, 300);
}

function showPreviousAnswer() {
    const options = document.querySelectorAll('.option');
    const userAnswer = userAnswers[currentQuestion];
    const q = questions[currentQuestion];
    options[userAnswer].classList.add('selected');
    if (userAnswer === q.correct) options[userAnswer].classList.add('correct');
    else { options[userAnswer].classList.add('incorrect'); options[q.correct].classList.add('correct'); }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('justification').classList.add('show');
    answered = true;
}

function nextQuestion() {
    if (!answered && userAnswers[currentQuestion] === undefined) {
        alert('Por favor, selecciona una respuesta antes de continuar.');
        return;
    }
    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        answered = userAnswers[currentQuestion] !== undefined;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    } else { showResults(); }
}

function previousQuestion() {
    if (currentQuestion > 0) {
        currentQuestion--;
        answered = true;
        renderQuestion(); updateProgress(); updateButtons();
        window.scrollTo(0, 0);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = currentQuestion === 0;
    document.getElementById('nextBtn').textContent = (currentQuestion === questions.length - 1)
        ? (answered ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
        : 'Siguiente →';
}

function updateProgress() {
    const pct = Math.round(((currentQuestion + 1) / questions.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
    document.getElementById('progressPct').textContent = pct + '%';
}

function showResults() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navButtons').style.display = 'none';
    document.getElementById('results').classList.add('show');
    const total = questions.length;
    const nota = Math.round((score / total) * 20);
    document.getElementById('finalScore').textContent = score;
    document.getElementById('totalQuestions').textContent = total;
    document.getElementById('finalNota').textContent = nota;
    setTimeout(() => {
        document.getElementById('gradeBarFill').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const badge = document.getElementById('gradeBadge');
    const msg = document.getElementById('resultMessage');
    if (nota >= 17) {
        badge.textContent = '🏆 Sobresaliente'; badge.className = 'grade-badge badge-excelente';
        msg.textContent = '¡Excelente desempeño! Dominas con solidez los temas de Historia del Perú. ¡Así se llega a la universidad! 🌟';
    } else if (nota >= 14) {
        badge.textContent = '👏 Aprobado — Bueno'; badge.className = 'grade-badge badge-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos históricos. Refuerza los temas donde fallaste y estarás listo para el examen de admisión. 📚';
    } else if (nota >= 11) {
        badge.textContent = '📖 Aprobado — Regular'; badge.className = 'grade-badge badge-regular';
        msg.textContent = 'Vas por buen camino, pero aún hay temas que necesitan más repaso. ¡Tú puedes mejorar, sigue adelante! ✏️';
    } else {
        badge.textContent = '💪 Desaprobado — Sigue intentando'; badge.className = 'grade-badge badge-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa los temas con calma, vuelve a intentarlo y verás cómo mejoras. ¡Ánimo! 🔥';
    }
}

function restartQuiz() {
    currentQuestion = 0; score = 0; answered = false; userAnswers.length = 0;
    document.getElementById('gradeBarFill').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('results').classList.remove('show');
    initQuiz();
}

initQuiz();
</script>

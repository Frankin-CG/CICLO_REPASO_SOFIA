<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Anatomía - Ciclo repaso</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul:        #1a6db5;
            --azul-mid:    #2484d4;
            --azul-light:  #4fa3e8;
            --azul-pale:   #e8f4fd;
            --azul-ultra:  #f0f8ff;
            --verde:       #1a8a5a;
            --verde-mid:   #22a86e;
            --verde-pale:  #e6f7ee;
            --rojo:        #c0392b;
            --rojo-pale:   #fdecea;
            --blanco:      #ffffff;
            --gris-fondo:  #f4f7fb;
            --texto:       #12263a;
            --texto-soft:  #4a6582;
            --texto-mid:   #2d4e6a;
            --borde:       #b8d8f5;
            --borde-pale:  #d6eaf8;
            --sombra:      rgba(26,109,181,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(160deg, #0d3c6e 0%, #1a6db5 40%, #1aaf7a 100%);
            min-height: 100vh;
            padding: 36px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* FONDO DECORATIVO */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(255,255,255,0.07) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(26,175,122,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: var(--blanco);
            border-radius: 20px;
            box-shadow: 0 24px 64px rgba(13,60,110,0.35), 0 0 0 1px rgba(74,163,232,0.3);
            max-width: 860px;
            width: 100%;
            overflow: hidden;
            animation: aparecer 0.55s cubic-bezier(0.16,1,0.3,1);
        }
        @keyframes aparecer {
            from { opacity:0; transform:translateY(36px) scale(0.98); }
            to   { opacity:1; transform:translateY(0) scale(1); }
        }

        /* ── CABECERA ── */
        .academia-header {
            background: linear-gradient(135deg, #0d3c6e 0%, #1a6db5 55%, #1aaf7a 100%);
            padding: 28px 40px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .academia-header::before {
            content:'';
            position:absolute; inset:0;
            background-image:
                repeating-linear-gradient(60deg, transparent, transparent 22px, rgba(255,255,255,0.04) 22px, rgba(255,255,255,0.04) 23px),
                repeating-linear-gradient(-60deg, transparent, transparent 22px, rgba(255,255,255,0.04) 22px, rgba(255,255,255,0.04) 23px);
        }
        .academia-header::after {
            content:'';
            position:absolute; bottom:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
        }
        .logo-container {
            position:relative; width:100%; max-width:280px;
            margin:0 auto 12px;
        }
        .logo-container img { width:100%; height:auto; max-height:110px; object-fit:contain; }
        .divisor-cabecera {
            width:60px; height:2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            margin:8px auto 0;
        }

        /* ── INTERIOR ── */
        .inner { padding:36px 44px 42px; }
        .encabezado { text-align:center; margin-bottom:28px; }
        .encabezado h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.85em;
            color: var(--texto);
            margin-bottom: 5px;
            letter-spacing: -0.3px;
        }
        .encabezado h1 span { color: var(--azul-mid); font-style: italic; }
        .encabezado p { color: var(--texto-soft); font-size:0.95em; font-weight:600; letter-spacing:0.3px; }

        /* ── PROGRESO ── */
        .progreso-wrap { margin-bottom:28px; }
        .progreso-info {
            display:flex; justify-content:space-between;
            font-size:0.82em; color:var(--texto-soft);
            font-weight:700; margin-bottom:7px; letter-spacing:0.3px;
        }
        .barra-fondo {
            width:100%; height:8px;
            background:var(--azul-pale);
            border-radius:10px; overflow:hidden;
            border:1px solid var(--borde-pale);
        }
        .barra-relleno {
            height:100%;
            background: linear-gradient(90deg, var(--azul), var(--verde-mid));
            width:0%; transition:width 0.45s ease;
            border-radius:10px;
        }

        /* ── PREGUNTA ── */
        .pregunta-card { display:none; animation:deslizar 0.3s ease; }
        .pregunta-card.active { display:block; }
        @keyframes deslizar {
            from { opacity:0; transform:translateX(18px); }
            to   { opacity:1; transform:translateX(0); }
        }
        .num-pregunta {
            display:inline-flex; align-items:center; gap:6px;
            background: linear-gradient(135deg, var(--azul), var(--azul-mid));
            color:#fff;
            font-weight:700; font-size:0.8em;
            letter-spacing:1.5px; text-transform:uppercase;
            padding:5px 15px; border-radius:50px; margin-bottom:14px;
        }
        .texto-pregunta {
            font-size:1.18em; color:var(--texto);
            margin-bottom:20px; line-height:1.68; font-weight:500;
        }
        .opciones { display:flex; flex-direction:column; gap:10px; }
        .opcion {
            padding:14px 20px;
            border:2px solid var(--borde-pale);
            border-radius:11px; cursor:pointer;
            transition:all 0.22s ease;
            font-size:1.03em; background:var(--blanco);
            color:var(--texto);
            display:flex; align-items:center; gap:12px;
        }
        .letra-opcion {
            width:28px; height:28px; min-width:28px;
            border-radius:50%;
            background:var(--azul-ultra);
            border:2px solid var(--borde);
            color:var(--azul);
            font-weight:800; font-size:0.82em;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.22s ease;
        }
        .opcion:hover {
            border-color:var(--azul-mid);
            background:var(--azul-pale);
            transform:translateX(5px);
            box-shadow:0 4px 14px var(--sombra);
        }
        .opcion:hover .letra-opcion { background:var(--azul); color:#fff; border-color:var(--azul); }
        .opcion.seleccionada { border-color:var(--azul-mid); background:var(--azul-pale); }
        .opcion.correcta  { border-color:var(--verde); background:var(--verde-pale); }
        .opcion.correcta .letra-opcion  { background:var(--verde); color:#fff; border-color:var(--verde); }
        .opcion.incorrecta { border-color:var(--rojo); background:var(--rojo-pale); }
        .opcion.incorrecta .letra-opcion { background:var(--rojo); color:#fff; border-color:var(--rojo); }
        .opcion.bloqueada { cursor:not-allowed; }
        .opcion.bloqueada:hover { transform:none; box-shadow:none; }

        /* ── JUSTIFICACIÓN ── */
        .justificacion {
            display:none;
            margin-top:18px; padding:16px 20px;
            background: linear-gradient(to right, var(--azul-pale), var(--azul-ultra));
            border-left:4px solid var(--azul-mid);
            border-radius:10px;
            animation:aparecer 0.35s ease;
            font-size:0.97em; color:var(--texto-soft); line-height:1.65;
        }
        .justificacion.visible { display:block; }
        .justificacion strong { color:var(--azul); }

        /* ── NAVEGACIÓN ── */
        .nav-botones { display:flex; justify-content:space-between; margin-top:28px; gap:14px; }
        .btn {
            padding:13px 30px; border:none; border-radius:10px;
            font-size:0.97em; cursor:pointer;
            transition:all 0.22s ease; font-weight:700;
            font-family:'DM Sans',sans-serif;
        }
        .btn-primario {
            background: linear-gradient(135deg, var(--azul), var(--azul-mid));
            color:#fff;
            box-shadow:0 4px 16px rgba(26,109,181,0.4);
        }
        .btn-primario:hover {
            transform:translateY(-2px);
            box-shadow:0 8px 24px rgba(26,109,181,0.5);
            background: linear-gradient(135deg, var(--azul-mid), var(--azul-light));
        }
        .btn-secundario {
            background:var(--blanco); color:var(--texto-soft);
            border:2px solid var(--borde-pale);
        }
        .btn-secundario:hover { background:var(--azul-pale); border-color:var(--borde); color:var(--texto-mid); }
        .btn:disabled { opacity:0.38; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

        /* ── RESULTADOS ── */
        .resultados { display:none; text-align:center; }
        .resultados.visible { display:block; }
        .resultados h2 {
            font-family:'DM Serif Display',serif;
            font-size:1.85em; color:var(--texto); margin-bottom:8px;
        }
        .circulo-nota {
            width:190px; height:190px; border-radius:50%;
            background: linear-gradient(135deg, var(--azul) 0%, var(--verde-mid) 100%);
            border:5px solid var(--azul-pale);
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            margin:26px auto 12px;
            box-shadow:0 14px 44px rgba(26,109,181,0.4), 0 0 0 10px rgba(26,109,181,0.08);
        }
        .nota-label { font-size:0.8em; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; color:#fff; opacity:0.8; }
        .nota-valor { font-family:'DM Serif Display',serif; font-size:3.8em; font-weight:900; line-height:1; color:#fff; }
        .nota-total { font-size:1em; color:#fff; opacity:0.75; }
        .detalle-puntaje {
            display:inline-block; background:var(--blanco);
            border:2px solid var(--borde-pale); border-radius:12px;
            padding:10px 26px; margin-bottom:20px;
            font-size:1em; color:var(--texto-soft);
        }
        .detalle-puntaje span { font-weight:800; color:var(--azul-mid); }
        .barra-grade-cont { width:100%; max-width:460px; margin:0 auto 18px; }
        .barra-grade-fondo { width:100%; height:14px; background:var(--azul-pale); border-radius:10px; overflow:hidden; margin-bottom:5px; border:1px solid var(--borde-pale); }
        .barra-grade-relleno { height:100%; border-radius:10px; transition:width 1s ease; background:linear-gradient(90deg, var(--azul), var(--verde-mid)); }
        .barra-grade-labels { display:flex; justify-content:space-between; font-size:0.77em; color:#7fb3d6; padding:0 2px; }
        .insignia {
            display:inline-block; padding:8px 22px; border-radius:50px;
            font-weight:800; font-size:1em; margin-bottom:16px; letter-spacing:0.4px;
        }
        .insignia-sobresaliente { background:#e6f7ee; color:#1a7a4a; border:2px solid #2ecc71; }
        .insignia-bueno         { background:var(--azul-pale); color:var(--azul); border:2px solid var(--azul-mid); }
        .insignia-regular       { background:#fff8e1; color:#c77e00; border:2px solid #f0b400; }
        .insignia-desaprobado   { background:var(--rojo-pale); color:var(--rojo); border:2px solid #e74c3c; }
        .resultados p.msg-resultado {
            font-size:1.08em; color:var(--texto-soft); margin-bottom:22px;
            line-height:1.7; max-width:500px; margin-left:auto; margin-right:auto;
        }
        .lema-resultado {
            background: linear-gradient(135deg, var(--azul), var(--verde-mid));
            color:#fff;
            padding:13px 30px; border-radius:50px;
            font-weight:700; font-size:1em;
            display:inline-block; margin-top:8px;
            letter-spacing:1.5px; text-transform:uppercase;
            box-shadow:0 4px 16px rgba(26,109,181,0.35);
        }

        @media (max-width:600px) {
            .inner { padding:22px 18px; }
            .academia-header { padding:22px 18px; }
            .encabezado h1 { font-size:1.45em; }
            .texto-pregunta { font-size:1.04em; }
            .nav-botones { flex-direction:column; }
            .circulo-nota { width:150px; height:150px; }
            .nota-valor { font-size:3em; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- CABECERA CON LOGO -->
    <div class="academia-header">
        <div class="logo-container">
            <img src="logo_SOFIA-Photoroom.png" alt="Logo Academia Sofía">
        </div>
        <div class="divisor-cabecera"></div>
    </div>

    <div class="inner">
        <div class="encabezado">
            <h1>🫀 Examen de <span>Anatomía</span></h1>
            <p>Sistema Cardiovascular &amp; Digestivo · 23 Preguntas</p>
        </div>

        <!-- BARRA DE PROGRESO -->
        <div class="progreso-wrap">
            <div class="progreso-info">
                <span id="textoProgreso">Pregunta 1 de 23</span>
                <span id="pctProgreso">0%</span>
            </div>
            <div class="barra-fondo">
                <div class="barra-relleno" id="barraRelleno"></div>
            </div>
        </div>

        <!-- CONTENEDOR DE PREGUNTAS -->
        <div id="quizContainer"></div>

        <!-- RESULTADOS -->
        <div class="resultados" id="resultados">
            <h2>🎉 ¡Examen Completado!</h2>
            <div class="circulo-nota">
                <div class="nota-label">Tu nota</div>
                <div class="nota-valor" id="notaFinal">0</div>
                <div class="nota-total">/ 20</div>
            </div>
            <div class="detalle-puntaje">
                Respuestas correctas: <span id="puntajeFinal">0</span> de <span id="totalPreguntas">23</span>
            </div>
            <div class="barra-grade-cont">
                <div class="barra-grade-fondo">
                    <div class="barra-grade-relleno" id="barraGrade" style="width:0%"></div>
                </div>
                <div class="barra-grade-labels"><span>0</span><span>5</span><span>10</span><span>15</span><span>20</span></div>
            </div>
            <div id="insigniaBadge" class="insignia"></div>
            <p class="msg-resultado" id="mensajeResultado"></p>
            <div class="lema-resultado">— Tutor Franklin —</div>
            <br><br>
            <button class="btn btn-primario" onclick="reiniciar()">🔄 Reintentar Examen</button>
        </div>

        <!-- BOTONES -->
        <div class="nav-botones" id="navBotones">
            <button class="btn btn-secundario" id="btnAnterior" onclick="anterior()">← Anterior</button>
            <button class="btn btn-primario"   id="btnSiguiente" onclick="siguiente()">Siguiente →</button>
        </div>
    </div>
</div>

<script>
const preguntas = [
    // ─── CARDIOLOGÍA ───────────────────────────────────────────────
    {
        pregunta: "Una persona es herida con un puñal que atravesó su corazón. Señale el orden correcto de las estructuras histológicas atravesadas:",
        opciones: [
            "Miocardio – endocardio – epicardio – pericardio",
            "Endocardio – epicardio – miocardio – pericardio",
            "Epicardio – endocardio – miocardio – pericardio",
            "Pericardio – epicardio – miocardio – endocardio",
            "Epicardio – miocardio – endocardio – pericardio"
        ],
        correcta: 3,
        justificacion: "El puñal ingresa desde el exterior hacia el interior: Pericardio → Epicardio → Miocardio → Endocardio. Este es el orden de las capas del corazón de afuera hacia adentro."
    },
    {
        pregunta: "Con respecto al sistema circulatorio, la irrigación del corazón la realiza:",
        opciones: ["Arteria aorta", "Arteria pulmonar", "Arteria coronaria", "Vena cava", "Vena coronaria"],
        correcta: 2,
        justificacion: "Las arterias coronarias derecha e izquierda nacen de la aorta ascendente y son las encargadas exclusivas de nutrir al músculo cardíaco (miocardio)."
    },
    {
        pregunta: "Capa del corazón responsable de la sístole y diástole:",
        opciones: ["Endocardio", "Miocardio", "Epicardio", "Pericardio", "Pleura"],
        correcta: 1,
        justificacion: "El miocardio es la capa muscular del corazón. Su contracción genera la sístole (eyección de sangre) y su relajación produce la diástole (llenado ventricular)."
    },
    {
        pregunta: "Se considera como el marcapaso accesorio del corazón:",
        opciones: ["Nodo sinusal", "Haz de Hiss", "Nodo auriculoventricular", "Fibras de Purkinje", "Fascículos internodales"],
        correcta: 2,
        justificacion: "El nodo AV (auriculoventricular) recibe el impulso del nodo sinusal y lo retransmite a los ventrículos. Actúa como marcapaso secundario o de respaldo cuando el nodo sinusal falla."
    },
    {
        pregunta: "Las arterias se originan en:",
        opciones: ["Las aurículas", "Las arteriolas", "Los tejidos", "Los ventrículos", "Los capilares"],
        correcta: 3,
        justificacion: "La arteria aorta nace del ventrículo izquierdo (circulación sistémica) y la arteria pulmonar del ventrículo derecho (circulación pulmonar)."
    },
    {
        pregunta: "Las venas pulmonares provistas de sangre oxigenada desembocan en:",
        opciones: ["El ventrículo izquierdo", "El ventrículo derecho", "La aurícula izquierda", "La aurícula derecha", "El cayado de la aorta"],
        correcta: 2,
        justificacion: "Las cuatro venas pulmonares regresan sangre rica en O₂ desde los pulmones hacia la aurícula izquierda, desde donde pasa al ventrículo izquierdo para ser bombeada al cuerpo."
    },
    {
        pregunta: "Relacione los vasos sanguíneos con las cavidades cardíacas:\n1. Arteria pulmonar   2. Vena coronaria\na) Aurícula derecha   b) Aurícula izquierda   c) Ventrículo derecho   d) Ventrículo izquierdo",
        opciones: ["1b, 2c", "1c, 2b", "1a, 2d", "1c, 2a", "1d, 2b"],
        correcta: 3,
        justificacion: "La arteria pulmonar sale del ventrículo derecho (c) llevando sangre desoxigenada a los pulmones. Las venas coronarias drenan en la aurícula derecha (a) a través del seno coronario."
    },
    {
        pregunta: "¿Qué vaso sale del ventrículo izquierdo y lleva sangre oxigenada hacia el cuerpo?",
        opciones: ["Arteria pulmonar", "Vena pulmonar", "Arteria aorta", "Vena cava superior", "Arteria coronaria"],
        correcta: 2,
        justificacion: "La arteria aorta es el vaso más importante del cuerpo. Nace del ventrículo izquierdo y distribuye sangre oxigenada a todos los órganos y tejidos de la circulación sistémica."
    },
    {
        pregunta: "¿Cuál es el volumen sistólico (volumen latido) normal de una persona adulta en reposo?",
        opciones: ["130 mL", "180 mL", "30 mL", "70 mL", "50 mL"],
        correcta: 3,
        justificacion: "El volumen sistólico normal en reposo es aproximadamente 70 mL por latido. Multiplicado por la frecuencia cardíaca (~70 lpm) da el gasto cardíaco de ~5 L/min."
    },
    {
        pregunta: "¿Cuál de las siguientes estructuras se conoce como el marcapaso principal o primario del corazón?",
        opciones: ["Nodo auriculoventricular", "Haz de Hiss", "Nodo sinusal", "Fibras de Purkinje", "Fascículos internodales"],
        correcta: 2,
        justificacion: "El nodo sinoauricular (SA o sinusal), ubicado en la aurícula derecha, genera el impulso eléctrico primario que marca el ritmo cardíaco normal de 60–100 lpm en reposo."
    },
    {
        pregunta: "Marque verdadero (V) o falso (F):\n1. El miocardio es la capa que permite las contracciones del corazón.\n2. La válvula bicúspide se ubica entre la aurícula y el ventrículo derecho.\n3. Las arterias se originan en las aurículas.",
        opciones: ["VVV", "FVF", "VFF", "FFF", "FVF"],
        correcta: 2,
        justificacion: "Solo (1) es verdadera: el miocardio contrae el corazón. (2) es falsa: la válvula bicúspide (mitral) está en el lado izquierdo. (3) es falsa: las arterias salen de los ventrículos."
    },
    {
        pregunta: "Las venas en general transportan sangre hipoxigenada, excepto las venas pulmonares que conducen sangre con:",
        opciones: ["CO₂", "Sangre desoxigenada", "O₂ — son la excepción venosa", "Quilo", "Plasma únicamente"],
        correcta: 2,
        justificacion: "Las venas pulmonares son la única excepción: regresan sangre oxigenada (con O₂) desde los pulmones hacia la aurícula izquierda, completando la circulación pulmonar."
    },

    // ─── SISTEMA DIGESTIVO ─────────────────────────────────────────
    {
        pregunta: "¿Dónde se encuentra la válvula ileocecal?",
        opciones: [
            "En la unión entre el esófago y el estómago",
            "En la unión entre el estómago con el duodeno",
            "En la desembocadura del conducto colédoco",
            "En la desembocadura de la porción final del intestino delgado",
            "En la porción final del recto"
        ],
        correcta: 3,
        justificacion: "La válvula ileocecal conecta el íleon (último segmento del intestino delgado) con el ciego (inicio del intestino grueso), impidiendo el reflujo del contenido intestinal."
    },
    {
        pregunta: "La bilis almacenada en la vesícula biliar facilita la degradación de los lípidos a través de la:",
        opciones: ["Lipasa gástrica", "Lipasa pancreática", "Nucleasa pancreática", "Elastasa", "Amilasa salival"],
        correcta: 1,
        justificacion: "La bilis emulsifica las grasas dividiéndolas en pequeñas gotitas, aumentando la superficie de contacto y facilitando así la acción de la lipasa pancreática sobre los lípidos."
    },
    {
        pregunta: "Escoja las enzimas que degradan almidón, proteínas y lípidos respectivamente:",
        opciones: [
            "Amilasa, pepsina y lipasa",
            "Tripsina, amilasa y lipasa",
            "Maltasa, pepsina y sacarasa",
            "Amilasa, pepsina y quimiotripsina",
            "Peptidasa, tripsina y lipasa"
        ],
        correcta: 0,
        justificacion: "Amilasa hidroliza el almidón (polisacárido) → maltosa. Pepsina degrada proteínas en el estómago. Lipasa desdobla los triglicéridos (lípidos) en ácidos grasos y glicerol."
    },
    {
        pregunta: "¿Cuál de las siguientes NO constituye función de la saliva en el organismo humano?",
        opciones: [
            "Conservar la humedad de la boca",

        opciones: [

            "Boca, estómago, esófago, faringe, I.delgado y grueso",
            "Boca, faringe, esófago, estómago, I.delgado y grueso"
        ],

        justificacion: "El orden correcto del tubo digestivo es: Boca → Faringe → Esófago → Estómago → Intestino delgado → Intestino grueso → Recto → Ano."

        opciones: ["1a, 2b, 3c", "2b, 1c, 3a", "2a, 3b, 4c", "1a, 2c, 3b", "2c, 3a, 4b"],

let preguntaActual = 0;
let puntaje = 0;
let respondido = false;
const respuestasUsuario = [];

function iniciar() { renderizarPregunta(); actualizarProgreso(); actualizarBotones(); }

function renderizarPregunta() {
    const q = preguntas[preguntaActual];
    const contenedor = document.getElementById('quizContainer');
    const letras = ['A','B','C','D','E'];
    contenedor.innerHTML = `
        <div class="pregunta-card active">
            <div class="num-pregunta">
                <span>🔬</span> Pregunta ${preguntaActual + 1} de ${preguntas.length}
            </div>
            <div class="texto-pregunta">${q.pregunta.replace(/\n/g,'<br>')}</div>
            <div class="opciones">
                ${q.opciones.map((op, i) => `
                    <div class="opcion" onclick="seleccionar(${i})" data-idx="${i}">
                        <span class="letra-opcion">${letras[i]}</span>
                        <span>${op}</span>
                    </div>
                `).join('')}
            </div>
            <div class="justificacion" id="justificacion">
                <strong>💡 Justificación:</strong> ${q.justificacion}
            </div>
        </div>
    `;
    if (respuestasUsuario[preguntaActual] !== undefined) mostrarRespuestaPrevia();
}

function seleccionar(idx) {
    if (respondido) return;
    const opciones = document.querySelectorAll('.opcion');
    opciones.forEach(o => o.classList.remove('seleccionada'));
    opciones[idx].classList.add('seleccionada');
    respondido = true;
    respuestasUsuario[preguntaActual] = idx;
    const q = preguntas[preguntaActual];
    setTimeout(() => {
        if (idx === q.correcta) { opciones[idx].classList.add('correcta'); puntaje++; }
        else { opciones[idx].classList.add('incorrecta'); opciones[q.correcta].classList.add('correcta'); }
        opciones.forEach(o => o.classList.add('bloqueada'));
        document.getElementById('justificacion').classList.add('visible');
        actualizarBotones();
    }, 280);
}

function mostrarRespuestaPrevia() {
    const opciones = document.querySelectorAll('.opcion');
    const ua = respuestasUsuario[preguntaActual];
    const q = preguntas[preguntaActual];
    opciones[ua].classList.add('seleccionada');
    if (ua === q.correcta) opciones[ua].classList.add('correcta');
    else { opciones[ua].classList.add('incorrecta'); opciones[q.correcta].classList.add('correcta'); }
    opciones.forEach(o => o.classList.add('bloqueada'));
    document.getElementById('justificacion').classList.add('visible');
    respondido = true;
}

function siguiente() {
    if (!respondido && respuestasUsuario[preguntaActual] === undefined) {
        alert('Por favor selecciona una respuesta antes de continuar.');
        return;
    }
    if (preguntaActual < preguntas.length - 1) {
        preguntaActual++;
        respondido = respuestasUsuario[preguntaActual] !== undefined;
        renderizarPregunta(); actualizarProgreso(); actualizarBotones();
        window.scrollTo(0,0);
    } else { mostrarResultados(); }
}

function anterior() {
    if (preguntaActual > 0) {
        preguntaActual--;
        respondido = true;
        renderizarPregunta(); actualizarProgreso(); actualizarBotones();
        window.scrollTo(0,0);
    }
}

function actualizarBotones() {
    document.getElementById('btnAnterior').disabled = preguntaActual === 0;
    document.getElementById('btnSiguiente').textContent =
        (preguntaActual === preguntas.length - 1)
            ? (respondido ? 'Ver Resultados 🎯' : 'Finalizar 🎯')
            : 'Siguiente →';
}

function actualizarProgreso() {
    const pct = Math.round(((preguntaActual + 1) / preguntas.length) * 100);
    document.getElementById('barraRelleno').style.width = pct + '%';
    document.getElementById('textoProgreso').textContent = `Pregunta ${preguntaActual + 1} de ${preguntas.length}`;
    document.getElementById('pctProgreso').textContent = pct + '%';
}

function mostrarResultados() {
    document.getElementById('quizContainer').style.display = 'none';
    document.getElementById('navBotones').style.display = 'none';
    document.getElementById('resultados').classList.add('visible');
    const total = preguntas.length;
    const nota = Math.round((puntaje / total) * 20);
    document.getElementById('puntajeFinal').textContent = puntaje;
    document.getElementById('totalPreguntas').textContent = total;
    document.getElementById('notaFinal').textContent = nota;
    setTimeout(() => {
        document.getElementById('barraGrade').style.width = ((nota / 20) * 100) + '%';
    }, 200);
    const insignia = document.getElementById('insigniaBadge');
    const msg = document.getElementById('mensajeResultado');
    if (nota >= 17) {
        insignia.textContent = '🏆 Sobresaliente'; insignia.className = 'insignia insignia-sobresaliente';
        msg.textContent = '¡Dominas el curso de Anatomía con solidez! Estás muy bien preparado para el examen de admisión. 🌟';
    } else if (nota >= 14) {
        insignia.textContent = '👏 Aprobado — Bueno'; insignia.className = 'insignia insignia-bueno';
        msg.textContent = '¡Muy bien! Tienes buenos conocimientos. Repasa los temas donde fallaste y estarás listo. 📚';
    } else if (nota >= 11) {
        insignia.textContent = '📖 Aprobado — Regular'; insignia.className = 'insignia insignia-regular';
        msg.textContent = 'Vas por buen camino, pero algunos temas necesitan refuerzo. ¡Sigue adelante, tú puedes! ✏️';
    } else {
        insignia.textContent = '💪 Sigue intentando'; insignia.className = 'insignia insignia-desaprobado';
        msg.textContent = 'No te rindas. Cada error es una lección. Repasa con calma y vuelve a intentarlo. ¡Ánimo! 🔥';
    }
}

function reiniciar() {
    preguntaActual = 0; puntaje = 0; respondido = false; respuestasUsuario.length = 0;
    document.getElementById('barraGrade').style.width = '0%';
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('navBotones').style.display = 'flex';
    document.getElementById('resultados').classList.remove('visible');
    iniciar();
}

iniciar();
</script>
